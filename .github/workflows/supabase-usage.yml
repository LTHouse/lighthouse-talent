# Weekly Supabase free-tier usage check (#19). Warns before a limit blindsides us.
#
# INERT until an admin adds these GH repo secrets (admin-gated):
#   SUPABASE_ACCESS_TOKEN     — Supabase Management API token (god-mode)
#   SUPABASE_PROJECT_REF      — rdnfckhtheescralfkwn
#   USAGE_ALERT_WEBHOOK_URL   — where to POST a summary when a metric > 80%
#                               (Phase 2: a Resend-backed `usage-alert` Edge Function, see #17)
name: supabase-usage

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
    steps:
      - name: Query usage + alert if over 80%
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          WEBHOOK: ${{ secrets.USAGE_ALERT_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          # Daily usage stats from the Management API.
          USAGE=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.supabase.com/v1/projects/$REF/usage" || echo '{}')
          echo "Usage: $USAGE"
          # Flag any metric whose usage/limit ratio exceeds 0.8.
          OVER=$(echo "$USAGE" | node -e '
            let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{
              let j={}; try{j=JSON.parse(s)}catch(e){}
              const hot=[];
              for (const [k,v] of Object.entries(j)) {
                if (v && typeof v==="object" && typeof v.usage==="number" && v.limit) {
                  const r=v.usage/v.limit;
                  if (r>0.8) hot.push(`${k}: ${(r*100).toFixed(0)}% (${v.usage}/${v.limit})`);
                }
              }
              process.stdout.write(hot.join("; "));
            });')
          if [ -n "$OVER" ]; then
            echo "::warning::Supabase usage over 80% — $OVER"
            if [ -n "${WEBHOOK:-}" ]; then
              curl -s -X POST "$WEBHOOK" -H "Content-Type: application/json" \
                -d "{\"text\":\"Lighthouse Supabase usage alert: $OVER. ~2 weeks of headroom — clean up data or upgrade to Pro.\"}" || true
            fi
          else
            echo "All Supabase metrics under 80% of free-tier limits."
          fi
